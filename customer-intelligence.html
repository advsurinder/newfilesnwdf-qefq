<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Intelligence — Jiox Restaurant Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#211F1C;
    --ink-2:#2B2925;
    --paper:#FBF7EF;
    --paper-line:#E4DCC8;
    --stamp-red:#B23A34;
    --stamp-green:#3F6B4C;
    --stamp-amber:#B8842B;
    --muted:#8A8272;
    --text:#211F1C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--paper);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1100px;margin:0 auto;padding:40px 24px 80px;}
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:24px;
    border-bottom:1px solid #45413A;
    padding-bottom:24px;
    margin-bottom:32px;
    flex-wrap:wrap;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:32px;
    font-weight:700;
    margin:0 0 6px;
    letter-spacing:-0.01em;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.12em;
    color:var(--stamp-amber);
    margin:0 0 8px;
  }
  .sub{color:#B8B2A4;font-size:14.5px;max-width:480px;line-height:1.5;margin:0;}

  .upload-zone{
    border:1.5px dashed #55503F;
    border-radius:10px;
    padding:22px 24px;
    display:flex;
    align-items:center;
    gap:18px;
    background:#28261F;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
    min-width:280px;
  }
  .upload-zone:hover, .upload-zone.drag{
    border-color:var(--stamp-amber);
    background:#312D24;
  }
  .upload-zone input{display:none;}
  .upload-icon{
    width:42px;height:42px;border-radius:8px;
    background:var(--stamp-amber);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .upload-text b{display:block;font-size:14.5px;color:var(--paper);}
  .upload-text span{font-size:12.5px;color:#9C9686;}

  .status-line{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--stamp-green);
    margin:16px 0 0;
    min-height:18px;
  }
  .status-line.err{color:var(--stamp-red);}

  .toolbar{
    display:flex;gap:14px;align-items:center;flex-wrap:wrap;
    margin:36px 0 20px;
  }
  .search{
    flex:1;min-width:220px;
    background:#28261F;
    border:1px solid #45413A;
    border-radius:8px;
    padding:11px 14px;
    color:var(--paper);
    font-family:'Inter',sans-serif;
    font-size:14px;
  }
  .search::placeholder{color:#8A8272;}
  .search:focus{outline:none;border-color:var(--stamp-amber);}

  .chip{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    padding:8px 14px;
    border-radius:20px;
    border:1px solid #45413A;
    background:transparent;
    color:#B8B2A4;
    cursor:pointer;
    white-space:nowrap;
  }
  .chip.active{background:var(--paper);color:var(--ink);border-color:var(--paper);}

  .stats{display:flex;gap:28px;margin-bottom:28px;flex-wrap:wrap;}
  .stat b{
    font-family:'Space Grotesk',sans-serif;
    font-size:26px;display:block;
  }
  .stat span{font-size:11.5px;color:#9C9686;text-transform:uppercase;letter-spacing:.08em;}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(270px, 1fr));
    gap:18px;
  }

  .ticket{
    position:relative;
    background:var(--paper);
    color:var(--text);
    border-radius:4px;
    padding:20px 18px 18px;
    cursor:pointer;
    box-shadow:0 8px 20px -8px rgba(0,0,0,.5);
    transition:transform .12s ease;
  }
  .ticket:hover{transform:translateY(-3px);}
  .ticket::before{
    content:"";
    position:absolute;top:0;left:0;right:0;height:8px;
    background-image:radial-gradient(circle at 8px 0, transparent 5px, var(--ink) 5.5px);
    background-size:16px 8px;
    background-repeat:repeat-x;
    transform:translateY(-8px);
  }
  .t-name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;font-size:17px;margin:0 0 2px;
    padding-right:70px;
  }
  .t-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:12px;}
  .t-row{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-top:1px dashed var(--paper-line);}
  .t-row span:first-child{color:var(--muted);}
  .t-row span:last-child{font-family:'IBM Plex Mono',monospace;font-weight:500;}
  .t-comment{
    margin-top:10px;font-size:12px;color:#5b5648;font-style:italic;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .stamp{
    position:absolute;top:16px;right:14px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;font-weight:600;letter-spacing:.06em;
    padding:4px 8px;border-radius:3px;
    transform:rotate(4deg);
    border:1.5px solid currentColor;
  }
  .stamp.flagged{color:var(--stamp-red);}
  .stamp.vip{color:var(--stamp-green);}
  .stamp.watch{color:var(--stamp-amber);}
  .stamp.standard{display:none;}

  .empty{
    grid-column:1/-1;
    text-align:center;padding:60px 20px;color:#8A8272;
    font-family:'IBM Plex Mono',monospace;font-size:13px;
  }

  .modal-bg{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
    align-items:center;justify-content:center;padding:24px;z-index:50;
  }
  .modal-bg.open{display:flex;}
  .modal{
    background:var(--paper);color:var(--text);
    max-width:520px;width:100%;max-height:85vh;overflow-y:auto;
    border-radius:6px;padding:28px;position:relative;
  }
  .modal h2{font-family:'Space Grotesk',sans-serif;margin:0 0 4px;font-size:22px;}
  .modal .t-meta{margin-bottom:18px;}
  .close-btn{
    position:absolute;top:16px;right:18px;background:none;border:none;
    font-size:20px;cursor:pointer;color:var(--muted);
  }
  .section-title{
    font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:.08em;color:var(--muted);margin:20px 0 8px;
  }
  .history-row{
    border-top:1px dashed var(--paper-line);padding:10px 0;font-size:13px;
  }
  .history-row .top{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-weight:500;}
  .history-row .note{color:#5b5648;margin-top:4px;font-size:12.5px;}
  .whatsapp-note{
    margin-top:22px;padding:14px;background:#EFE8D6;border-radius:6px;
    font-size:12.5px;color:#5b5648;line-height:1.5;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <p class="eyebrow">Jiox Restaurant Manager</p>
      <h1>Customer Intelligence</h1>
      <p class="sub">Upload your order exports. Every customer gets pulled together into one file — orders, charges, comments, and a risk read.</p>
    </div>

    <label class="upload-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" multiple>
      <div class="upload-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#211F1C" stroke-width="2.2"><path d="M12 3v12m0-12 4 4m-4-4-4 4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
      </div>
      <div class="upload-text">
        <b>Upload order file</b>
        <span>.xlsx, .xls or .csv — drop it here</span>
      </div>
    </label>
  </header>

  <p class="status-line" id="statusLine"></p>

  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <input class="search" id="searchInput" placeholder="Search a customer by name or phone...">
    <button class="chip active" data-filter="all">All</button>
    <button class="chip" data-filter="flagged">Flagged</button>
    <button class="chip" data-filter="watch">Watch</button>
    <button class="chip" data-filter="vip">VIP</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalContent"></div>
</div>

<script>
/* ---------- storage ---------- */
const STORAGE_KEY = 'jiox_customer_records';
function loadRecords(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e){ return {}; }
}
function saveRecords(records){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}
let records = loadRecords();
let currentFilter = 'all';
let currentSearch = '';

/* ---------- header normalization ---------- */
const FIELD_ALIASES = {
  name:      ['customer name','customer','name','client','client name'],
  phone:     ['phone','phone number','contact','mobile'],
  email:     ['email','e-mail'],
  orderNum:  ['order number','order #','order no','order id','order'],
  item:      ['item','items','item details','product','order item','order details'],
  charge:    ['error charge','error charges','charge','chargeback','refund','negative payout','payout','dispute amount','amount'],
  comment:   ['comment','comments','note','notes','feedback','review'],
  platform:  ['platform','source','channel'],
  date:      ['date','order date','created']
};

function normalizeKey(k){
  return String(k).toLowerCase().trim();
}

function mapHeaders(headerRow){
  const map = {};
  headerRow.forEach((raw, idx) => {
    const norm = normalizeKey(raw);
    for(const field in FIELD_ALIASES){
      if(FIELD_ALIASES[field].some(alias => norm.includes(alias))){
        if(!(field in map)) map[field] = idx;
      }
    }
  });
  return map;
}

/* ---------- risk logic ---------- */
function isNegative(row){
  const chargeVal = row.charge;
  if(chargeVal === undefined || chargeVal === null || chargeVal === '') return false;
  const num = parseFloat(String(chargeVal).replace(/[^0-9.\-]/g,''));
  if(!isNaN(num) && num < 0) return true;
  const s = String(chargeVal).toLowerCase();
  return /chargeback|dispute|refund|missing|never arrived|quality issue|error/.test(s) || (!isNaN(num) && num > 0);
}

function computeStatus(rec){
  if(rec.negativeCount >= 2) return 'flagged';
  if(rec.negativeCount === 1) return 'watch';
  if(rec.orderCount >= 4 && rec.negativeCount === 0) return 'vip';
  return 'standard';
}

/* ---------- file parsing ---------- */
function key(name, phone){
  return (String(name||'').trim().toLowerCase() + '|' + String(phone||'').trim()).trim();
}

function processWorkbook(workbook, filename){
  let addedRows = 0;
  workbook.SheetNames.forEach(sheetName => {
    const sheet = workbook.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
    if(rows.length < 2) return;
    const headerMap = mapHeaders(rows[0]);
    if(!('name' in headerMap)) return;

    for(let i=1;i<rows.length;i++){
      const r = rows[i];
      if(!r || r.every(c => c === '')) continue;
      const row = {};
      for(const field in headerMap){ row[field] = r[headerMap[field]]; }
      if(!row.name) continue;

      const k = key(row.name, row.phone);
      if(!records[k]){
        records[k] = {
          name: row.name, phone: row.phone || '', email: row.email || '',
          orderCount:0, negativeCount:0, totalCharge:0,
          history: []
        };
      }
      const rec = records[k];
      rec.orderCount += 1;
      const negative = isNegative(row);
      if(negative) rec.negativeCount += 1;
      const chargeNum = parseFloat(String(row.charge||'0').replace(/[^0-9.\-]/g,'')) || 0;
      if(negative) rec.totalCharge += Math.abs(chargeNum);

      rec.history.push({
        order: row.orderNum || '',
        item: row.item || '',
        charge: row.charge || '',
        comment: row.comment || '',
        platform: row.platform || '',
        date: row.date || '',
        negative, source: filename
      });
      addedRows++;
    }
  });
  return addedRows;
}

function handleFiles(fileList){
  const statusLine = document.getElementById('statusLine');
  statusLine.className = 'status-line';
  statusLine.textContent = 'Reading files…';

  let filesLeft = fileList.length;
  let totalRows = 0;

  Array.from(fileList).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try{
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type:'array'});
        totalRows += processWorkbook(workbook, file.name);
      }catch(err){
        statusLine.className = 'status-line err';
        statusLine.textContent = 'Could not read ' + file.name + ' — check it\'s a valid Excel/CSV file.';
      }
      filesLeft--;
      if(filesLeft === 0){
        saveRecords(records);
        statusLine.className = 'status-line';
        statusLine.textContent = totalRows + ' rows processed. ' + Object.keys(records).length + ' customers on file.';
        render();
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

/* ---------- rendering ---------- */
function fmtMoney(n){ return '$' + Number(n).toFixed(2); }

function statusLabel(s){
  return {flagged:'FLAGGED', watch:'WATCH', vip:'VIP', standard:''}[s];
}

function renderStats(){
  const list = Object.values(records);
  const flagged = list.filter(r => computeStatus(r) === 'flagged').length;
  const vip = list.filter(r => computeStatus(r) === 'vip').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><b>${list.length}</b><span>Customers on file</span></div>
    <div class="stat" style="color:var(--stamp-red)"><b>${flagged}</b><span>Flagged</span></div>
    <div class="stat" style="color:var(--stamp-green)"><b>${vip}</b><span>VIP</span></div>
  `;
}

function render(){
  renderStats();
  const grid = document.getElementById('grid');
  let list = Object.entries(records).map(([k, rec]) => ({k, rec, status: computeStatus(rec)}));

  if(currentFilter !== 'all'){
    list = list.filter(x => x.status === currentFilter);
  }
  if(currentSearch.trim()){
    const q = currentSearch.toLowerCase();
    list = list.filter(x => x.rec.name.toLowerCase().includes(q) || String(x.rec.phone).includes(q));
  }

  list.sort((a,b) => b.rec.orderCount - a.rec.orderCount);

  if(list.length === 0){
    grid.innerHTML = '<div class="empty">No customer records yet. Upload an order file to get started.</div>';
    return;
  }

  grid.innerHTML = list.map(({k, rec, status}) => {
    const lastComment = [...rec.history].reverse().find(h => h.comment)?.comment || '';
    return `
      <div class="ticket" data-key="${encodeURIComponent(k)}">
        <div class="stamp ${status}">${statusLabel(status)}</div>
        <p class="t-name">${escapeHtml(rec.name)}</p>
        <p class="t-meta">${rec.phone || 'no phone on file'}</p>
        <div class="t-row"><span>Orders</span><span>${rec.orderCount}</span></div>
        <div class="t-row"><span>Disputes</span><span>${rec.negativeCount}</span></div>
        ${rec.totalCharge > 0 ? `<div class="t-row"><span>Charged back</span><span>${fmtMoney(rec.totalCharge)}</span></div>` : ''}
        ${lastComment ? `<p class="t-comment">"${escapeHtml(lastComment)}"</p>` : ''}
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.ticket').forEach(el => {
    el.addEventListener('click', () => openModal(decodeURIComponent(el.dataset.key)));
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function openModal(k){
  const rec = records[k];
  if(!rec) return;
  const status = computeStatus(rec);
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <button class="close-btn" id="closeModal">×</button>
    <div class="stamp ${status}" style="position:static;display:${status==='standard'?'none':'inline-block'};margin-bottom:10px;">${statusLabel(status)}</div>
    <h2>${escapeHtml(rec.name)}</h2>
    <p class="t-meta">${rec.phone || 'no phone'} ${rec.email ? '· ' + escapeHtml(rec.email) : ''}</p>

    <div class="section-title">Summary</div>
    <div class="t-row"><span>Total orders</span><span>${rec.orderCount}</span></div>
    <div class="t-row"><span>Disputes / negative payouts</span><span>${rec.negativeCount}</span></div>
    <div class="t-row"><span>Total charged back</span><span>${fmtMoney(rec.totalCharge)}</span></div>

    <div class="section-title">Order history</div>
    ${rec.history.map(h => `
      <div class="history-row">
        <div class="top">
          <span>${escapeHtml(h.order || '—')} ${h.platform ? '· ' + escapeHtml(h.platform) : ''}</span>
          <span style="color:${h.negative ? 'var(--stamp-red)' : 'inherit'}">${h.charge ? escapeHtml(String(h.charge)) : ''}</span>
        </div>
        ${h.item ? `<div class="note">${escapeHtml(h.item)}</div>` : ''}
        ${h.comment ? `<div class="note">"${escapeHtml(h.comment)}"</div>` : ''}
      </div>
    `).join('') || '<p class="note">No line-item history recorded.</p>'}

    <div class="whatsapp-note">
      <b>WhatsApp auto-alert:</b> once the backend is connected, a summary like this gets sent to your business WhatsApp automatically the moment this customer's next order is logged.
    </div>
  `;
  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
}

/* ---------- events ---------- */
document.getElementById('fileInput').addEventListener('change', (e) => handleFiles(e.target.files));

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
});

document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    render();
  });
});

document.getElementById('modalBg').addEventListener('click', e => {
  if(e.target.id === 'modalBg') closeModal();
});

render();
</script>
</body>
</html>
